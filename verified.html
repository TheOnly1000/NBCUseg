<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Verified – NBCU Segmentor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
:root{--primary:#003ec7;--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--success:#16a34a}
*,*::before,*::after{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.check-circle{width:72px;height:72px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.check-circle svg{width:36px;height:36px}
h1{font-size:24px;font-weight:800;margin:0 0 8px}
p{font-size:14px;color:var(--text2);margin:0 0 24px;line-height:1.5}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.hidden{display:none}
</style>
</head>
<body>
<div class="card">
<div class="check-circle">
<svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
<polyline points="20 6 9 17 4 12"/>
</svg>
</div>
<h1>Email Verified</h1>
<p id="status-msg">Your email has been verified successfully. Redirecting to the app...</p>
<div id="loading-indicator"><span class="spinner"></span></div>
<a id="continue-btn" href="./index.html" class="btn" style="display:none">Continue to App</a>
</div>
<script>
var SUPABASE_URL = "https://fzbktwyurskhvtwkklzu.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Ymt0d3l1cnNraHZ0d2trbHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDIwODEsImV4cCI6MjA5Nzg3ODA4MX0.MEZzsQ7BHs_Jh2wozEkJVml43T599w0PkG9GH8aAyUM";
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var hasToken = window.location.hash && window.location.hash.includes("access_token");

sb.auth.getSession().then(function(r) {
  if (r.data.session || hasToken) {
    document.getElementById("loading-indicator").classList.add("hidden");
    document.getElementById("continue-btn").style.display = "inline-block";
    setTimeout(function() { window.location.href = "./index.html"; }, 3000);
  } else {
    document.getElementById("status-msg").textContent = "No verification token found. Redirecting...";
    setTimeout(function() { window.location.href = "./index.html"; }, 1500);
  }
});
</script>
</body>
</html>
