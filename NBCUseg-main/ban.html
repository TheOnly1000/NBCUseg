<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Account Blocked – NBCU Segmentor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
:root{--primary:#003ec7;--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--error:#dc2626}
*,*::before,*::after{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.block-icon{width:72px;height:72px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.block-icon svg{width:36px;height:36px}
h1{font-size:24px;font-weight:800;margin:0 0 8px}
p{font-size:14px;color:var(--text2);margin:0 0 20px;line-height:1.6}
.btn{background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-error{background:var(--error)}
.admin-list{text-align:left;font-size:13px;color:var(--text2);margin:16px 0;padding:12px 16px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.admin-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.admin-item .ms{font-size:16px;color:var(--primary)}
.admin-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.hidden{display:none}
#loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;color:var(--text2);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:flex;flex-direction:column;gap:8px;margin-top:24px}
</style>
</head>
<body>
<div class="card">
<div class="block-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
</svg>
</div>
<h1>Account Blocked</h1>
<p>Your account has been blocked. Contact an administrator to resolve this issue.</p>
<div id="loading"><span class="spinner"></span> Loading admin contacts...</div>
<div id="admin-section" class="hidden">
<div class="admin-list" id="admin-list"></div>
<button onclick="contactAdmin()" class="btn btn-error"><span class="ms" style="font-size:18px">mail</span> Contact Admin</button>
</div>
<div id="no-admin" class="hidden"><p>No admin contacts available. Please try again later.</p></div>
<div class="actions">
<a href="./index.html" class="btn btn-outline">Try Again</a>
</div>
</div>
<script>
var SUPABASE_URL = "https://fzbktwyurskhvtwkklzu.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Ymt0d3l1cnNraHZ0d2trbHp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDIwODEsImV4cCI6MjA5Nzg3ODA4MX0.MEZzsQ7BHs_Jh2wozEkJVml43T599w0PkG9GH8aAyUM";
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

sb.from("profiles").select("name,email").eq("role","admin").then(function(r) {
  document.getElementById("loading").classList.add("hidden");
  if (r.data && r.data.length) {
    var list = r.data.map(function(a) {
      return '<div class="admin-item"><span class="ms">person</span><span><strong>' + (a.name || a.email) + '</strong> &mdash; ' + a.email + '</span></div>';
    }).join("");
    document.getElementById("admin-list").innerHTML = '<div class="admin-label">Administrators</div>' + list;
    document.getElementById("admin-section").classList.remove("hidden");
  } else {
    document.getElementById("no-admin").classList.remove("hidden");
  }
});

function contactAdmin() {
  sb.from("profiles").select("email").eq("role","admin").then(function(r) {
    if (r.data && r.data.length) {
      var emails = r.data.map(function(a){ return a.email }).join(",");
      var sub = encodeURIComponent("Account Blocked - Access Required");
      var body = encodeURIComponent("Hello,\n\nMy account has been blocked and I need assistance to regain access.\n\nPlease help resolve this issue.\n\nThank you.");
      window.location.href = "mailto:" + emails + "?subject=" + sub + "&body=" + body;
    }
  });
}
</script>
</body>
</html>
